# Experiment 024 smoke: continue 022 on v3.9 clean eval/data with direct author-style triplet loss.
model:
  base_model_id: google/gemma-3-4b-pt
  torch_dtype: bfloat16

adapter:
  num_prefix_tokens: 16
  num_queries: 16
  encoder:
    num_queries: 16
    perceiver_layers: 2
    perceiver_heads: 8
  projector:
    hidden_mult: 2
    use_trunk: false
  injection:
    inject_layers_start: 17
    inject_layers_end: 32

data:
  train_path: data/pairs_v3_9_core2_evalclean/train.jsonl
  val_path: data/pairs_v3_9_core2_evalclean/val.jsonl
  test_path: data/pairs_v3_9_core2_evalclean/test.jsonl
  reference_max: 512
  instruction_max: 64
  target_max: 512

training:
  output_dir: /tmp/stage1_v3_9_style_triplet_022continue
  batch_size: 2
  max_steps: 500
  lr_projector: 1.0e-5
  lr_encoder: 5.0e-6
  warmup: 25
  save_every: 250
  log_every: 25
  mixed_precision: bf16
  sample_every: 0
  sample_max_new_tokens: 120
  probe_path: data/pairs_v3_9_core2_evalclean/probes_balanced.jsonl
  contrastive_weight: 0.02
  contrastive_clamp: true
  style_triplet_weight: 0.25
  style_triplet_margin: 0.25
  init_from: /tmp/exp022_final.pt

runpod:
  storage_name: Peter
  remote_root: /workspace/text-ip-adapter
