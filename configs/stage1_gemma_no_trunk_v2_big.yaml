# BIG training on v2 corpus — 25k steps to match 006's 8 epochs of exposure depth.
# Dry-run at 2000 steps showed cos_K_first_swap = 0.99 (severe undertraining;
# only 0.59 epochs on 13.5k pairs). Need real exposure depth.
# Save every 5k → 5 checkpoints for intermediate deep eval.
model:
  base_model_id: google/gemma-3-4b-pt
  torch_dtype: bfloat16

adapter:
  num_prefix_tokens: 16
  num_queries: 16
  encoder:
    num_queries: 16
    perceiver_layers: 2
    perceiver_heads: 8
  projector:
    hidden_mult: 2
    use_trunk: false
  injection:
    inject_layers_start: 17
    inject_layers_end: 32

data:
  train_path: data/pairs_v2/train.v2_clean.jsonl
  val_path: data/pairs_v2/val.v2_clean.jsonl
  test_path: data/pairs_v2/test.v2_clean.jsonl
  reference_max: 512
  instruction_max: 128
  target_max: 256

training:
  output_dir: checkpoints/stage1_v2_big
  batch_size: 4
  max_steps: 25000
  lr_projector: 1.0e-4
  lr_encoder: 5.0e-5
  warmup: 1500
  save_every: 5000
  log_every: 50
  mixed_precision: bf16
  sample_every: 500
  sample_max_new_tokens: 120
  probe_path: data/pairs/probes.llm.jsonl
  contrastive_weight: 0.1
  contrastive_clamp: true

runpod:
  storage_name: Peter
  remote_root: /workspace/text-ip-adapter
