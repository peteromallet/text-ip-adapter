model:
  base_model_id: google/gemma-3-4b-pt
  torch_dtype: bfloat16

adapter:
  num_prefix_tokens: 16
  num_queries: 16
  encoder:
    num_queries: 16
    perceiver_layers: 2
    perceiver_heads: 8
  projector:
    hidden_mult: 2
  injection:
    inject_layers_start: 17
    inject_layers_end: 32

data:
  train_path: data/pairs/train.llm.jsonl
  val_path: data/pairs/val.llm.jsonl
  test_path: data/pairs/test.llm.jsonl
  reference_max: 512
  instruction_max: 128
  target_max: 256

training:
  output_dir: checkpoints/stage1_gemma_contrastive
  batch_size: 4
  max_steps: 2000
  lr_projector: 1.0e-4
  lr_encoder: 5.0e-5
  warmup: 200
  save_every: 500
  log_every: 10
  mixed_precision: bf16
  sample_every: 100
  sample_max_new_tokens: 120
  probe_path: data/pairs/probes.llm.jsonl
  # Experiment 004: contrastive loss on per-layer projector K/V.
  # Goal: break the projector-collapse diagnosed by experiment 003
  # (cos_K/V 0.77-0.98 across pathological refs). Start at weight 0.1;
  # if K/V cosine hasn't meaningfully moved by step 500, raise to 0.5.
  contrastive_weight: 0.1
  contrastive_clamp: true

runpod:
  storage_name: Peter
  remote_root: /workspace/text-ip-adapter
