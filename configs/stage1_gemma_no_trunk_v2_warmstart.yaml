# Plan A: warm-start from 006's final checkpoint, fine-tune on v2 corpus.
# Hypothesis: 006 already has working conditioning (cos_K_first_swap=0.22).
# Cold-start on v2 collapsed encoder (cos_K=0.99). Warm-starting bypasses
# the collapse-to-constant attractor; fine-tuning on v2 should preserve
# discrimination + add diversity.
model:
  base_model_id: google/gemma-3-4b-pt
  torch_dtype: bfloat16

adapter:
  num_prefix_tokens: 16
  num_queries: 16
  encoder:
    num_queries: 16
    perceiver_layers: 2
    perceiver_heads: 8
  projector:
    hidden_mult: 2
    use_trunk: false
  injection:
    inject_layers_start: 17
    inject_layers_end: 32

data:
  train_path: data/pairs_v2/train.v2_clean.jsonl
  val_path: data/pairs_v2/val.v2_clean.jsonl
  test_path: data/pairs_v2/test.v2_clean.jsonl
  reference_max: 512
  instruction_max: 128
  target_max: 256

training:
  output_dir: checkpoints/stage1_v2_warmstart
  batch_size: 4
  max_steps: 5000
  lr_projector: 5.0e-5      # half of 006's 1e-4 to avoid disrupting learned discrimination
  lr_encoder: 2.5e-5        # half of 006's 5e-5
  warmup: 100
  save_every: 1000
  log_every: 25
  mixed_precision: bf16
  sample_every: 200
  sample_max_new_tokens: 120
  probe_path: data/pairs/probes.llm.jsonl
  contrastive_weight: 0.1
  contrastive_clamp: true
  init_from: checkpoints/stage1_gemma_no_trunk/final.pt

runpod:
  storage_name: Peter
  remote_root: /workspace/text-ip-adapter
