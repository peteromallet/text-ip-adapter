# Stage A: warmstart from 006 + ONLY bump target_max.
# Tests truncation hypothesis specifically. Keep ref_max same as 006.
# Memory budget: 4090 24GB. Per-sample tokens 512+128+1024=1664 (vs 006's 896).
model:
  base_model_id: google/gemma-3-4b-pt
  torch_dtype: bfloat16

adapter:
  num_prefix_tokens: 16
  num_queries: 16
  encoder:
    num_queries: 16
    perceiver_layers: 2
    perceiver_heads: 8
  projector:
    hidden_mult: 2
    use_trunk: false
  injection:
    inject_layers_start: 17
    inject_layers_end: 32

data:
  train_path: data/pairs_v2/train.v2_clean.jsonl
  val_path: data/pairs_v2/val.v2_clean.jsonl
  test_path: data/pairs_v2/test.v2_clean.jsonl
  reference_max: 512
  instruction_max: 128
  target_max: 1024

training:
  output_dir: checkpoints/stage1_v2_bigctx
  batch_size: 1
  max_steps: 8000          # double steps to compensate for batch=1
  lr_projector: 5.0e-5
  lr_encoder: 2.5e-5
  warmup: 200
  save_every: 2000
  log_every: 50
  mixed_precision: bf16
  sample_every: 1000
  sample_max_new_tokens: 200
  probe_path: data/pairs/probes.llm.jsonl
  contrastive_weight: 0.0  # disabled — needs batch>=2
  contrastive_clamp: true
  init_from: checkpoints/stage1_gemma_no_trunk/final.pt

runpod:
  storage_name: Peter
  remote_root: /workspace/text-ip-adapter
